<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-NAM Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Accordion transition styles */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] > summary svg.caret { transform: rotate(90deg); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-gray-300 px-6 py-3 flex justify-between items-center shadow-sm z-20 shrink-0">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 border-r border-gray-300 pr-6">
                <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-xs border border-gray-300">🏛️</div>
                <div class="text-xs font-semibold leading-tight text-gray-600">GOVERNMENT<br>OF INDIA</div>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-2xl font-bold text-green-700">e-NAM</div>
                <div class="text-xs font-bold text-green-800 hidden sm:block leading-tight">राष्ट्रीय कृषि बाजार<br>NATIONAL AGRICULTURE MARKET</div>
            </div>
        </div>
        <div class="flex items-center gap-6 text-sm">
            <div class="text-center border-r border-gray-300 pr-4">
                <span class="text-gray-500 text-xs block">Language</span>
                <span class="font-semibold text-green-700 cursor-pointer">English ▾</span>
            </div>
            <div class="text-center border-r border-gray-300 pr-4">
                <span class="text-gray-500 text-xs block">Helpline</span>
                <a href="tel:1800270244" class="font-semibold text-blue-600">1800-270-244</a>
            </div>
            <div class="flex items-center gap-2 cursor-pointer hover:bg-gray-50 p-2 rounded-lg transition">
                <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center border border-gray-400">👤</div>
                <span class="font-medium text-sm">Login/Register</span>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside class="w-72 bg-white border-r border-gray-300 flex flex-col shrink-0 overflow-y-auto custom-scroll shadow-sm z-10">
            <div class="p-4 bg-gray-200 border-b border-gray-300 sticky top-0 z-10">
                <h3 id="sidebar-filter-title" class="font-bold text-gray-800 text-center">Select Location</h3>
            </div>
            
            <div id="sidebar-filter-list" class="p-2 space-y-1 text-sm font-medium">
                </div>
        </aside>

        <main class="flex-1 flex flex-col gap-4 p-4 overflow-y-auto custom-scroll bg-gray-100 relative">
            
            <div class="bg-white border border-gray-300 rounded-xl p-4 flex justify-between items-center shadow-sm">
                <div>
                    <h1 id="primary-title" class="text-2xl font-bold text-gray-900">Shevanti (Flower)</h1>
                    <p id="primary-subtitle" class="text-gray-600 text-sm">Commodity View - Showing All Markets</p>
                </div>
                <div class="flex flex-col items-end">
                    <p class="text-sm font-semibold text-gray-700 mb-1">Switch Context</p>
                    <div class="flex bg-gray-200 p-1 rounded-lg border border-gray-300 shadow-inner">
                        <button id="btn-commodity" class="px-4 py-1.5 text-sm font-bold rounded-md bg-white shadow text-green-800 transition-all">Commodity</button>
                        <button id="btn-state" class="px-4 py-1.5 text-sm font-medium rounded-md text-gray-600 hover:text-gray-800 transition-all">State</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-gray-300 flex flex-col shadow-sm relative" style="height: 400px;">
                <div class="p-3 border-b border-gray-200 flex justify-between items-center bg-gray-50 rounded-t-xl z-20">
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-semibold text-gray-600">Filters:</span>
                        <select class="bg-white border border-gray-30
